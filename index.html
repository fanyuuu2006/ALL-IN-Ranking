<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>《ALL IN 梭哈》名次管理系統</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>《ALL IN 梭哈》</h1>
        <div class="header-actions">
          <input
            type="text"
            id="searchInput"
            placeholder="搜尋玩家..."
            autocomplete="off"
          />
          <button id="exportBtn" class="btn btn-secondary">匯出 JSON</button>
          <div class="import-wrapper">
            <label for="importFile" class="btn btn-secondary">匯入 JSON</label>
            <input type="file" id="importFile" accept=".json" />
          </div>
          <button id="resetBtn" class="btn btn-danger">重設資料</button>
        </div>
      </header>

      <main class="main-content">
        <section class="left-panel">
          <div class="panel-section init-section">
            <h2>初始化名單</h2>
            <p class="help-text">每行輸入一個名稱，將以此建立初始玩家名單。</p>
            <textarea
              id="initNames"
              placeholder="大林&#10;陳阿班&#10;洗恩"
            ></textarea>
            <button id="initBtn" class="btn btn-primary">確認建立</button>
          </div>

          <div class="panel-section rules-section">
            <h2>比賽規則</h2>
            <ul class="rules-list">
              <li>第一輪得分最高 20 名晉級第二輪</li>
              <li>第二輪得分最高 10 名晉級第三輪</li>
              <li>第三輪得分最高 5 名晉級決賽</li>
            </ul>
            <p>同分時排序規則：</p>
            <ol class="rules-list">
              <li>最大牌型成功預測次數</li>
              <li>做出過的第一大牌型</li>
              <li>做出過的第二大牌型</li>
              <li>做出過的第三大牌型</li>
              <li>喊 All in 次數</li>
              <li>報到順序 (越小越前)</li>
            </ol>
          </div>

          <div class="panel-section logs-section">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1rem;
              "
            >
              <h2 style="margin: 0">對局記錄</h2>
              <button id="addMatchBtn" class="btn btn-primary">
                ➕ 新增對局
              </button>
            </div>
            <div id="matchesContainer" class="logs-list"></div>
          </div>
        </section>

        <section class="right-panel">
          <div class="ranking-header">
            <div class="col-rank">排名</div>
            <div class="col-name">名稱</div>
            <div class="col-score">分數</div>
            <div class="col-stats">詳細數據</div>
            <div class="col-actions">操作</div>
          </div>
          <div id="rankingList" class="ranking-list">
            <!-- 玩家清單動態產生於此 -->
          </div>
        </section>
      </main>
    </div>

    <!-- 對局編輯 Modal -->
    <div id="matchModal" class="modal">
      <div class="modal-content" style="max-width: 800px; display: flex; flex-direction: column; max-height: 90vh;">
        <div class="modal-header">
          <h3 id="matchModalTitle" style="color: var(--color-primary);">新增對局</h3>
          <button class="close-btn" id="closeMatchModalBtn">&times;</button>
        </div>
        <div class="modal-body" style="flex: 1; overflow-y: auto; padding: 24px;">
          <form id="matchForm">
            <input type="hidden" id="editMatchId" />
            <div
              class="form-group"
              style="
                display: flex;
                gap: 12px;
                align-items: center;
                margin-bottom: 24px;
              "
            >
              <select id="playerSelector" style="flex: 1; padding: 10px; font-size: 15px;" class="input">
                <option value="">-- 加入玩家至本局 --</option>
              </select>
              <button
                type="button"
                id="addPlayerToMatchBtn"
                class="btn btn-secondary"
              >
                ➕ 加入
              </button>
            </div>
            <div id="matchPlayersList" style="display: flex; flex-direction: column; gap: 16px;">
              <!-- 動態產生對局玩家表單 -->
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            id="cancelMatchEditBtn"
          >
            取消
          </button>
          <button type="button" class="btn btn-primary" id="saveMatchBtn">
            儲存對局
          </button>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
